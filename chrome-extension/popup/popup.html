<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Scout v2</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- ヘッダー -->
    <header class="header">
      <h1>Location Scout v2</h1>
      <button id="settingsBtn" class="icon-btn" title="設定">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </header>

    <!-- メイン画面 -->
    <main id="mainView">
      <div class="current-page">
        <label>現在のページ</label>
        <div id="currentUrl" class="url-display">読み込み中...</div>
      </div>

      <div class="options">
        <label class="checkbox-label">
          <input type="checkbox" id="enableCrawl" checked>
          <span>関連ページも自動取得</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="saveImages" checked>
          <span>画像を保存 (テスト: 上位2枚)</span>
        </label>
      </div>

      <button id="startBtn" class="primary-btn">
        <span class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
        </span>
        情報を収集
      </button>

      <!-- 進捗表示 -->
      <div id="progressSection" class="progress-section hidden">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div id="progressText" class="progress-text">準備中...</div>
        <div id="progressDetail" class="progress-detail"></div>
      </div>

      <!-- 結果表示 -->
      <div id="resultSection" class="result-section hidden">
        <h3>処理完了</h3>
        <div id="resultContent"></div>
        <div id="errorList" class="error-list hidden">
          <h4>スキップされた項目</h4>
          <ul id="errorItems"></ul>
        </div>
      </div>
    </main>

    <!-- 設定画面 -->
    <div id="settingsView" class="hidden">
      <div class="settings-header">
        <button id="backBtn" class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <h2>設定</h2>
      </div>

      <div class="settings-content">
        <!-- API設定 -->
        <section class="settings-section">
          <h3>API設定</h3>
          <div class="form-group">
            <label for="apiKey">OpenAI API Key</label>
            <input type="password" id="apiKey" placeholder="sk-...">
          </div>
        </section>

        <!-- Google Drive設定 -->
        <section class="settings-section">
          <h3>Google Drive設定</h3>
          <div class="form-group">
            <label for="parentFolderId">親フォルダID</label>
            <input type="text" id="parentFolderId" placeholder="Google DriveのフォルダID">
            <small>保存先フォルダのIDを入力（URLの/folders/以降の文字列）</small>
          </div>
          <button id="selectFolderBtn" class="secondary-btn">フォルダを選択</button>
        </section>

        <!-- スプレッドシート設定 -->
        <section class="settings-section">
          <h3>スプレッドシート設定</h3>
          <div class="form-group">
            <label for="spreadsheetId">スプレッドシートID</label>
            <input type="text" id="spreadsheetId" placeholder="スプレッドシートID">
          </div>
          <label class="checkbox-label">
            <input type="checkbox" id="saveToSheets" checked>
            <span>スプレッドシートに保存</span>
          </label>
        </section>

        <!-- スライド設定 -->
        <section class="settings-section">
          <h3>スライド設定</h3>
          <div class="form-group">
            <label for="slideMode">スライド作成モード</label>
            <select id="slideMode">
              <option value="new">新規作成</option>
              <option value="append">既存に追加</option>
            </select>
          </div>
          <div class="form-group" id="masterSlideGroup">
            <label for="masterSlideId">マスタースライドID</label>
            <input type="text" id="masterSlideId" placeholder="追加先のスライドID">
            <small>スライドURLの/d/以降、/edit前の文字列</small>
          </div>
        </section>

        <!-- 認証 -->
        <section class="settings-section">
          <h3>Google認証</h3>
          <div id="authStatus" class="auth-status">未認証</div>
          <button id="authBtn" class="secondary-btn">Googleアカウントでログイン</button>
        </section>

        <button id="saveSettingsBtn" class="primary-btn">設定を保存</button>
      </div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
